<style>
:root{--ink:#0a0907;--ink2:#13100b;--line:rgba(184,152,90,.16);--line2:rgba(184,152,90,.32);--gold:#b8985a;--gold-b:#e8bf70;--bone:#f3eee2;--muted:#a39c8c;--dim:#7d7768;--steel:#6b7480;--steel-b:#9aa3ae;--cg:'Fraunces',serif;--mono:'JetBrains Mono',monospace;--body:'Inter',sans-serif}

body{margin:0;background:radial-gradient(120% 100% at 50% 0%,#15120c 0%,var(--ink) 60%);color:var(--bone);font-family:var(--body);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.stage{position:relative;border:1px solid var(--line);border-radius:16px;background:var(--ink2);overflow:hidden;max-width:1000px;width:100%;margin:0 auto;flex:1;min-height:0}
.stage-top{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);position:relative;z-index:6}
.stage-top .nm{font-family:var(--cg);font-weight:500;font-size:22px;letter-spacing:-.01em}
.stage-top .po{color:var(--muted);font-size:11.5px;font-family:var(--mono);letter-spacing:.4px}
.stage-top .chip{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;border:1px solid var(--line2);color:var(--gold-b);padding:5px 11px;border-radius:999px}
.moatbadge{position:absolute;right:16px;bottom:13px;font-family:var(--mono);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);opacity:.45;z-index:4;pointer-events:none}
svg{display:block;width:100%;height:100%}text{font-family:var(--mono)}
.scene{opacity:0;transition:opacity .55s ease}.scene.on{opacity:1}
.point{position:absolute;left:22px;top:18px;z-index:3;max-width:60%;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-b);opacity:0;transition:opacity .5s ease}.point.on{opacity:.92}
.cap{position:absolute;left:0;right:0;bottom:0;padding:14px 24px 16px;background:linear-gradient(0deg,rgba(8,7,5,.96),transparent);font-family:var(--cg);font-size:19px;line-height:1.38;min-height:46px;display:flex;align-items:flex-end;z-index:3}
.cap .beat{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold-b);margin-right:13px;opacity:.92;white-space:nowrap}
.cap span.t{opacity:0;transition:opacity .55s ease}.cap.show span.t{opacity:1}
.ov{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;opacity:0;pointer-events:none;transition:opacity .5s ease}.ov.on{opacity:1}
.title{background:radial-gradient(120% 120% at 50% 40%,#16120b,#070605 82%)}
.title .rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:22px;transition:width .9s ease .2s}.title.on .rule{width:220px}
.title .kick{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-b);margin-bottom:18px;opacity:0;transform:translateY(8px);transition:.55s .25s}.title.on .kick{opacity:.95;transform:none}
.title .head{font-family:var(--cg);font-weight:500;font-size:clamp(26px,4.4vw,46px);line-height:1.16;letter-spacing:-.012em;max-width:19ch}
.title .head .ln{display:block;opacity:0;transform:translateY(14px);transition:.65s cubic-bezier(.2,.7,.3,1)}
.title.on .head .ln:nth-child(1){transition-delay:.4s}.title.on .head .ln:nth-child(2){transition-delay:.8s}
.title.on .head .ln{opacity:1;transform:none}.title .head em{font-style:normal;color:var(--gold-b)}.title.on .head em{animation:flash 1s ease 1.1s both}
.ctl{display:flex;align-items:center;gap:10px;padding:8px 16px 2px;max-width:1000px;margin:0 auto;flex-wrap:wrap;flex:none}
.btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1.3px;text-transform:uppercase;border:1px solid var(--line2);background:rgba(184,152,90,.08);color:var(--gold-b);padding:10px 15px;border-radius:999px;cursor:pointer}
.btn.ghost{background:none;color:var(--muted);border-color:var(--line)}
.beats{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;align-items:center}
.beatdot{width:8px;height:8px;border-radius:50%;border:1px solid var(--line2);cursor:pointer;transition:.2s}.beatdot.title{transform:rotate(45deg);border-radius:1px}.beatdot.active{background:var(--gold-b);border-color:var(--gold-b);box-shadow:0 0 0 3px rgba(184,152,90,.18)}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.16)}100%{transform:scale(1);opacity:1}}
@keyframes ringfill{to{stroke-dashoffset:var(--off)}}@keyframes rise{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes flow{0%{offset-distance:0%;opacity:0}12%{opacity:1}88%{opacity:1}100%{offset-distance:100%;opacity:0}}
@keyframes sweep{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.016)}}
@keyframes flash{0%{filter:none;transform:scale(1)}28%{filter:drop-shadow(0 0 16px rgba(232,191,112,.95));transform:scale(1.2)}100%{filter:none;transform:scale(1)}}
@keyframes flashbig{0%{opacity:0;transform:scale(.7)}25%{opacity:1;transform:scale(1.08);filter:drop-shadow(0 0 22px rgba(232,191,112,.9))}80%{opacity:1;transform:scale(1)}100%{opacity:.25;transform:scale(1)}}
@keyframes pulseLine{0%,100%{opacity:.45;stroke-width:3}50%{opacity:1;stroke-width:5}}
.flashable{transform-box:fill-box;transform-origin:center}
.foot{max-width:1000px;margin:6px auto 8px;color:var(--muted);font-size:10px;padding:0 16px;flex:none}
.foot .sample{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#c9a24a;border:1px solid rgba(201,162,74,.4);background:rgba(201,162,74,.07);padding:3px 8px;border-radius:6px}
:focus-visible{outline:2px solid var(--gold-b);outline-offset:3px}
@media(prefers-reduced-motion:reduce){.scene,.ov{transition:none}*{animation-duration:.001s!important}}
@media(max-width:640px){.cap{font-size:15px;padding:15px}.stage-top .nm{font-size:17px}.point{max-width:70%}}
</style></head>

function runDissect(){const name=document.getElementById('dName'),val=document.getElementById('dVal'),rings=document.getElementById('dRings');if(!rings)return;
 let i=0;function showFacet(fi){name.textContent=LB[fi];val.textContent=F[fi].toFixed(1);rings.innerHTML='';
  const subs=SUBMECH_FACET[fi]||SUBMECH_FACET[0];const r3=rng(slug(P.name)+fi);
  subs.forEach((nm,j)=>{const ang=(-116+j*58)*Math.PI/180,rr=160,x=460+Math.cos(ang)*rr,y=336+Math.sin(ang)*rr;
   const v=Math.max(4,Math.min(9.2,Math.round((F[fi]+(r3()-.45)*0.8)*10)/10));
   rings.appendChild(el('line',{x1:460,y1:336,x2:x,y2:y,stroke:'rgba(184,152,90,.14)'}));
   rings.appendChild(el('circle',{cx:x,cy:y,r:25,fill:'#13100b',stroke:'rgba(184,152,90,.22)'}));
   const c=2*Math.PI*25,off=c*(1-v/10);const ring=el('circle',{cx:x,cy:y,r:25,fill:'none',stroke:'url(#gGold)','stroke-width':3.5,'stroke-linecap':'round',transform:`rotate(-90 ${x} ${y})`,'stroke-dasharray':c,'stroke-dashoffset':c});ring.style.transition='stroke-dashoffset .9s ease';rings.appendChild(ring);requestAnimationFrame(()=>ring.setAttribute('stroke-dashoffset',off));
   rings.appendChild(tx({x:x,y:y+5,fill:'#e8bf70','font-size':14,'text-anchor':'middle'},v.toFixed(1)));
   rings.appendChild(tx({x:x,y:y+42,fill:'#d8d1c2','font-size':10,'text-anchor':'middle'},nm));});}
 function step(){if(i>=INVIS.length)return;showFacet(INVIS[i]);i++;setTimeout(step,RM?1:2150);}step();}
function runPlay(){const ball=document.getElementById('playBall'),burst=document.getElementById('playBurst'),trail=document.getElementById('playTrail'),lab=document.getElementById('playLabel');if(!ball)return;
 ball.style.animation='none';trail.style.transition='none';trail.setAttribute('stroke-dashoffset',900);if(lab)lab.setAttribute('opacity',0);burst.setAttribute('r',0);
 requestAnimationFrame(()=>{trail.style.transition='stroke-dashoffset 1.3s ease';trail.setAttribute('stroke-dashoffset',0);
  ball.style.animation='ballfly 1.35s cubic-bezier(.4,0,.7,1) forwards';
  setTimeout(()=>{burst.style.transition='r .4s ease, opacity .6s ease';burst.setAttribute('r',30);burst.style.opacity=0;if(lab){lab.setAttribute('opacity',1);}},RM?1:1350);});}
function runMorph(){const pl=document.getElementById('morphPoly'),stg=document.getElementById('morphStage'),val=document.getElementById('morphVal');if(!pl)return;
 function pp(v){return v.map((x,i)=>{const a=(-90+i*45)*Math.PI/180;return [CX+Math.cos(a)*(x/10)*R,CY+Math.sin(a)*(x/10)*R].join(",");}).join(" ");}
 let s=0;function step(){if(s>=P.morph.length-1)return;const t0=performance.now();stg.textContent=P.morph[s+1][0];val.textContent=P.morph[s+1][1].toFixed(1);
  (function f(t){const k=Math.min(1,(t-t0)/(RM?1:850));const a=P.morph[s][2],b=P.morph[s+1][2];pl.setAttribute('points',pp(a.map((x,i)=>x+(b[i]-x)*k)));if(k<1)requestAnimationFrame(f);else{s++;setTimeout(step,RM?1:600);}})(performance.now());}
 stg.textContent=P.morph[0][0];val.textContent=P.morph[0][1].toFixed(1);pl.setAttribute('points',pp(P.morph[0][2]));s=0;setTimeout(step,RM?1:450);}

const scenes=document.querySelectorAll('.scene');
const title=document.getElementById('title'),tkick=document.getElementById('tkick'),thead=document.getElementById('thead');
const cap=document.getElementById('cap'),capt=document.getElementById('captext'),beat=document.getElementById('beat'),pointEl=document.getElementById('point'),beatsWrap=document.getElementById('beats');
let idx=0,timer=null,playing=true,CURID='';
B.forEach((b,i)=>{const d=document.createElement('div');d.className='beatdot'+(b.t==='title'?' title':'');d.tabIndex=0;d.addEventListener('click',()=>jump(i));beatsWrap.appendChild(d);});

function compCount(){const n=document.getElementById('compNum');if(!n)return;const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1150);n.textContent=(COMP*(.15+.85*k)).toFixed(1);if(k<1)requestAnimationFrame(f);else n.textContent=COMP.toFixed(1);})(performance.now());}
function goatGrow(){const b=document.getElementById('goatBar'),v=document.getElementById('goatVal');if(!b)return;const w=parseFloat(b.dataset.w);b.style.transition='width 1.2s ease';requestAnimationFrame(()=>b.setAttribute('width',w));const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1200);v.textContent=(F[0]*(.1+.9*k)).toFixed(1);if(k<1)requestAnimationFrame(f);})(performance.now());}
function show(i){idx=i;const b=B[i];dots.forEach((d,k)=>d.classList.toggle('active',k===i));pointEl.classList.remove('on');
 if(b.t==='title'){scenes.forEach(s=>s.classList.remove('on'));cap.classList.remove('show');beat.textContent='';capt.textContent='';
   tkick.textContent=b.k;thead.innerHTML=b.h.map(l=>`<span class="ln">${l}</span>`).join('');title.classList.remove('on');void title.offsetWidth;title.classList.add('on');}
 else{title.classList.remove('on');scenes.forEach(s=>{if(s.id===b.id){s.classList.remove('on');void s.offsetWidth;s.classList.add('on');}else s.classList.remove('on');});
   beat.textContent=b.b;cap.classList.remove('show');capt.textContent=b.c;setTimeout(()=>cap.classList.add('show'),140);
   if(b.pt){pointEl.textContent='› '+b.pt;setTimeout(()=>pointEl.classList.add('on'),200);}
   CURID=b.id;document.getElementById('canvas').style.cursor=(b.id==='s3')?'pointer':'default';
   if(b.id==='s0')compCount();if(b.id==='s4')goatGrow();if(b.id==='sMorph')runMorph();if(b.id==='s2')runDissect();if(b.id==='s3')runPlay();}}
function next(){show((idx+1)%B.length);schedule();}
function schedule(){clearTimeout(timer);if(!playing)return;timer=setTimeout(next,RM?1500:(B[idx].d||5000));}
function jump(i){playing=true;document.getElementById('play').textContent='⏸ Pause';show(i);schedule();}
document.getElementById('play').addEventListener('click',function(){playing=!playing;this.textContent=playing?'⏸ Pause':'▶ Play';playing?schedule():clearTimeout(timer);});
document.getElementById('replay').addEventListener('click',()=>{playing=true;document.getElementById('play').textContent='⏸ Pause';show(0);schedule();});
show(0);schedule();
})();

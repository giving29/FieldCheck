<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldCheck Reads</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0907;--ink2:#13100b;--line:rgba(184,152,90,.18);--line2:rgba(184,152,90,.34);--gold:#b8985a;--gold-b:#e6bd6f;--bone:#f0eadd;--muted:#9a9385;--steel:#6b7480;--steel-b:#9aa3ae;--cg:'Fraunces',serif;--mono:'JetBrains Mono',monospace;--body:'Inter',sans-serif}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 100% at 50% 0%,#15120c 0%,var(--ink) 60%);color:var(--bone);font-family:var(--body)}
.stage{position:relative;border:1px solid var(--line);border-radius:16px;background:var(--ink2);overflow:hidden;max-width:1000px;margin:0 auto}
.stage-top{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);position:relative;z-index:6}
.stage-top .nm{font-family:var(--cg);font-size:21px}
.stage-top .po{color:var(--muted);font-size:12px;font-family:var(--mono);letter-spacing:.5px}
.stage-top .chip{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;border:1px solid var(--line2);color:var(--gold-b);padding:5px 10px;border-radius:999px}
.moatbadge{position:absolute;right:16px;bottom:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);opacity:.5;z-index:4;pointer-events:none}
svg{display:block;width:100%;height:auto}text{font-family:var(--mono)}
.scene{opacity:0;transition:opacity .6s ease}.scene.on{opacity:1}
.cap{position:absolute;left:0;right:0;bottom:0;padding:18px 22px 20px;background:linear-gradient(0deg,rgba(8,7,5,.94),transparent);font-family:var(--cg);font-size:19px;line-height:1.4;min-height:58px;display:flex;align-items:flex-end;z-index:3}
.cap .beat{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-b);margin-right:13px;opacity:.9;white-space:nowrap}
.cap span.t{opacity:0;transition:opacity .6s ease}.cap.show span.t{opacity:1}
.ov{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;opacity:0;pointer-events:none;transition:opacity .55s ease}
.ov.on{opacity:1}
.title{background:radial-gradient(120% 120% at 50% 40%,#16120b,#080705 80%)}
.title .rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:24px;transition:width 1s ease .2s}.title.on .rule{width:230px}
.title .kick{font-family:var(--mono);font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-b);margin-bottom:20px;opacity:0;transform:translateY(8px);transition:.6s .25s}.title.on .kick{opacity:.95;transform:none}
.title .head{font-family:var(--cg);font-weight:500;font-size:clamp(25px,4.2vw,44px);line-height:1.18;max-width:18ch}
.title .head .ln{display:block;opacity:0;transform:translateY(15px);transition:.7s cubic-bezier(.2,.7,.3,1)}
.title.on .head .ln:nth-child(1){transition-delay:.45s}.title.on .head .ln:nth-child(2){transition-delay:.85s}
.title.on .head .ln{opacity:1;transform:none}.title .head em{font-style:normal;color:var(--gold-b)}.title.on .head em{animation:flash 1.1s ease 1.2s both}
.sharecard{background:radial-gradient(120% 120% at 50% 35%,#17130c,#070605 82%)}
.sc-kick{font-family:var(--mono);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-b);margin-bottom:16px;opacity:0;transition:.5s .2s}.sharecard.on .sc-kick{opacity:.9}
.sc-card{width:340px;max-width:88vw;border-radius:18px;padding:20px;background:linear-gradient(165deg,#1d1810,#120e08);border:1px solid var(--line2);box-shadow:0 40px 80px rgba(0,0,0,.55);opacity:0;transform:translateY(18px) scale(.96);transition:.8s cubic-bezier(.2,.8,.3,1.05) .35s}.sharecard.on .sc-card{opacity:1;transform:none}
.sc-head{display:flex;align-items:center;gap:13px;margin-bottom:13px}.sc-poly{flex:0 0 66px}
.sc-id .n{font-family:var(--cg);font-size:20px;line-height:1.1}.sc-id .m{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.sc-score{margin-left:auto;text-align:right}.sc-score .big{font-family:var(--cg);font-size:38px;color:var(--gold-b);line-height:1}.sc-score .t{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted)}
.sc-asym{border-top:1px solid var(--line);padding-top:13px;font-size:14px;text-align:left;line-height:1.45}.sc-asym b{color:var(--gold-b)}
.sc-cta{margin-top:15px;display:flex;gap:10px}.sc-cta .b{flex:1;font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;border:1px solid var(--line2);color:var(--gold-b);padding:10px;border-radius:9px;text-align:center}.sc-cta .b.solid{background:var(--gold);color:#0a0907;border-color:var(--gold)}
.ctl{display:flex;align-items:center;gap:10px;padding:13px 16px 4px;max-width:1000px;margin:0 auto;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;border:1px solid var(--line2);background:rgba(184,152,90,.08);color:var(--gold-b);padding:10px 15px;border-radius:999px;cursor:pointer}
.btn.ghost{background:none;color:var(--muted);border-color:var(--line)}
.beats{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:center}
.beatdot{width:9px;height:9px;border-radius:50%;border:1px solid var(--line2);background:transparent;cursor:pointer;transition:.2s}.beatdot.title{transform:rotate(45deg);border-radius:1px}.beatdot.active{background:var(--gold-b);border-color:var(--gold-b);box-shadow:0 0 0 3px rgba(184,152,90,.18)}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes ringfill{to{stroke-dashoffset:var(--off)}}@keyframes rise{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
@keyframes flow{0%{offset-distance:0%;opacity:0}12%{opacity:1}88%{opacity:1}100%{offset-distance:100%;opacity:0}}
@keyframes sweep{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
@keyframes flash{0%{filter:none;transform:scale(1)}28%{filter:drop-shadow(0 0 16px rgba(230,189,111,.95));transform:scale(1.22)}100%{filter:none;transform:scale(1)}}
@keyframes pulseLine{0%,100%{opacity:.45;stroke-width:3}50%{opacity:1;stroke-width:5}}
.flashable{transform-box:fill-box;transform-origin:center}
.foot{max-width:1000px;margin:14px auto 30px;color:var(--muted);font-size:11px;padding:0 16px}
.foot .sample{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#c9a24a;border:1px solid rgba(201,162,74,.4);background:rgba(201,162,74,.07);padding:3px 8px;border-radius:6px}
:focus-visible{outline:2px solid var(--gold-b);outline-offset:3px}
@media(prefers-reduced-motion:reduce){.scene,.ov{transition:none}*{animation-duration:.001s!important}}
@media(max-width:640px){.cap{font-size:15px;padding:15px}.stage-top .nm{font-size:17px}}
</style></head>
<body>
<div class="stage">
  <div class="stage-top"><span class="nm" id="pName">—</span><span class="po" id="pPos"></span><span class="chip" id="pTier"></span></div>
  <svg id="canvas" viewBox="0 0 920 600" role="img" aria-label="FieldCheck dissection">
    <defs>
      <linearGradient id="gGold" x1="0" x2="1"><stop offset="0" stop-color="#8a7038"/><stop offset="1" stop-color="#e6bd6f"/></linearGradient>
      <radialGradient id="gGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="rgba(184,152,90,.28)"/><stop offset="100%" stop-color="rgba(184,152,90,0)"/></radialGradient>
      <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    </defs>
    <g class="scene" id="s0"></g><g class="scene" id="sKey"></g><g class="scene" id="s1"></g>
    <g class="scene" id="s2"></g><g class="scene" id="s3"></g><g class="scene" id="s4"></g>
    <g class="scene" id="sMorph"></g><g class="scene" id="s6"></g>
  </svg>
  <div class="ov title" id="title"><div class="rule"></div><div class="kick" id="tkick"></div><div class="head" id="thead"></div></div>
  <div class="ov sharecard" id="sharecard"><div class="sc-kick">The new card · share the read</div>
    <div class="sc-card"><div class="sc-head"><svg class="sc-poly" viewBox="0 0 80 80" id="scPoly"></svg>
      <div class="sc-id"><div class="n" id="scName"></div><div class="m" id="scMeta"></div></div>
      <div class="sc-score"><div class="big" id="scBig"></div><div class="t" id="scTier"></div></div></div>
      <div class="sc-asym" id="scAsym"></div>
      <div class="sc-cta"><span class="b solid">Share the read</span><span class="b">See the full read</span></div></div></div>
  <div class="cap" id="cap"><span class="beat" id="beat"></span><span class="t" id="captext"></span></div>
  <div class="moatbadge">The Moat · reading the invisible</div>
</div>
<div class="ctl"><button class="btn" id="play">⏸ Pause</button><button class="btn ghost" id="replay">↻ Replay</button><div class="beats" id="beats"></div></div>
<div class="foot"><span class="sample">Illustrative sample data — not live engine output</span> · player-aware via <span style="font-family:var(--mono)">?p=name</span> · wires to <span style="font-family:var(--mono)">brutal_honest · canonical_facets_8 · projection · clip.ai_read</span></div>

<script>
(function(){
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
const NS="http://www.w3.org/2000/svg";
const CX=370,CY=300,R=176;

/* ---- sport vocab (facet[0] = Competitiveness everywhere = the moat hero) ---- */
const SPORT_FACETS={
 volleyball:['Competitiveness','Talent','Physical','Volleyball IQ','Mental Strength','Mindset','Coachability','Character'],
 basketball:['Competitiveness','Scoring','Athleticism','Basketball IQ','Mental Strength','Playmaking','Defense','Character'],
 baseball:['Competitiveness','Power','Speed','Hitting','Mental Strength','Baseball IQ','Durability','Character'],
 football:['Competitiveness','Explosiveness','Hands','Football IQ','Mental Strength','Route Craft','Durability','Character'],
 soccer:['Competitiveness','Finishing','Pace','Vision','Mental Strength','Technique','Work Rate','Character']
};
const INVIS=[0,4,5,7]; // competitiveness, mental strength, mindset/playmaking-slot, character — the unseen
const SUBMECH_BY_SPORT={
 volleyball:[['Response to opponent runs',.04],['Late-set kill conversion',.03],['Serve-receive composure',-.02],['Demand the ball, tight sets',.02],['Bounce-back after a block',0]],
 basketball:[['Response to runs',.04],['Closing-time usage',.02],['Defensive pickup pressure',.03],['50/50 & loose-ball rate',-.01],['Bounce-back after a miss',0]],
 baseball:[['Two-strike approach',.03],['Clutch RBI rate',.04],['At-bat after an error',.02],['Late-inning focus',-.01],['Plate discipline under heat',0]],
 football:[['Compete for the ball',.04],['Yards after contact',.03],['4th-quarter snaps',.02],['Response to a deficit',-.01],['Bounce-back after a drop',0]],
 soccer:[['Big-game goals',.04],['Composure 1v1',.03],['Press to win it back',.02],['Response to going down',-.01],['Bounce-back after a miss',0]]
};
const CLIP_BY_SPORT={
 volleyball:{tag:'SET 5 · 12–12 · OPPONENT SERVING RUN',cap:'Back-to-back kills from the pin — the swing got bigger as the score got tighter.'},
 basketball:{tag:'4TH QUARTER · DOWN 6 · RANKED OPPONENT',cap:'Three straight stops, then the and-one — effort rose when the game tightened.'},
 baseball:{tag:'BOTTOM 9 · TWO OUTS · TYING RUN ON',cap:'Worked a full count, then drove it the other way — the approach got better under pressure.'},
 football:{tag:'4TH QUARTER · 3RD & LONG · TRAIL BY 4',cap:'High-point grab in traffic — went up biggest when the down was longest.'},
 soccer:{tag:'88TH MINUTE · LEVEL · KNOCKOUT TIE',cap:'Took the shot no one else wanted — and buried it when it mattered most.'}
};

/* ---- authored players ---- */
const AUTHORED={
 'madisen skinner':{sport:'volleyball',pos:'Outside Hitter',voice:'The Closer',tier:'STAR',composite:7.5,goatName:'the WVB GOAT',goatScore:9.2,
   facets:[7.9,7.5,7.4,7.3,7.7,7.2,7.4,7.2],
   asym:{market:'A decorated college outside hitter — a solid professional prospect.',fc:'An elite competitive closer — the kill-in-the-clutch will reads at the pro band.',gap:'The résumé tells you she won. We tell you the trait that won it.'},
   traj:[['Club',5.9],['Transfer',6.6],['Title runs',7.5],['Now',7.9],['Pro / LOVB',8.3]],infl:'transfer + title run → competitiveness +0.9'},
 'cooper flagg':{sport:'basketball',pos:'Forward',voice:'The Phenom',tier:'STAR',composite:7.6,goatName:'Michael Jordan',goatScore:9.3,
   facets:[8.1,7.9,7.7,7.6,7.8,7.4,7.5,7.3],
   asym:{market:'Polished two-way wing — a safe, high-floor #1.',fc:'The competitiveness is the separator — a motor that re-rates the whole profile.',gap:'The market prices his floor. We price his will — and the will built the floor.'},
   traj:[['HS soph',5.8],['HS sr',6.7],['Freshman',7.6],['Now',8.1],['Projected',8.6]],infl:'tournament run vs elite competition → motor +0.9'},
 'caitlin clark':{sport:'basketball',pos:'Guard',voice:'The Logo',tier:'ELITE',composite:8.4,goatName:'Michael Jordan',goatScore:9.3,
   facets:[8.6,8.8,7.6,8.5,8.4,8.7,7.4,8.0],
   asym:{market:'A generational scorer with deep range.',fc:'The competitiveness and the will to take the moment is what makes the range lethal.',gap:'Everyone sees the threes. We see why she keeps taking the biggest one.'},
   traj:[['HS',6.6],['College',7.8],['Now',8.4],['Pro',8.7],['Projected',9.0]],infl:'record-breaking tournament runs → competitiveness +1.0'},
 'aaron judge':{sport:'baseball',pos:'Outfielder',voice:'The Judge',tier:'ELITE+',composite:9.0,goatName:'the baseball GOAT',goatScore:9.5,
   facets:[9.0,9.6,7.0,8.9,9.1,8.6,7.4,8.8],
   asym:{market:'Record-setting power — three MVPs.',fc:'The competitive at-bat under the brightest lights is what turns the power into history.',gap:'The numbers are loud. We tell you which trait made them happen.'},
   traj:[['Minors',6.2],['Rookie',7.6],['MVP',8.7],['Record',9.2],['Now',9.0]],infl:'the 62-HR season → the whole profile re-rated'}
};

/* sport + voice for every reel player (so generics are coherent) */
const SPORTOF={'eugene wilson iii':'football','imhotep cromer':'football','luka doncic':'basketball','caitlin clark':'basketball','aj dybantsa':'basketball','harper murray':'volleyball','cooper flagg':'basketball','giannis antetokounmpo':'basketball','aaron judge':'baseball','lionel messi':'soccer','stephen curry':'basketball','cristiano ronaldo':'soccer','lebron james':'basketball','jordan larson':'volleyball','madisen skinner':'volleyball','cameron boozer':'basketball','juju watkins':'basketball'};
const VOICEOF={'eugene wilson iii':'The Blur','imhotep cromer':'The Deep Threat','luka doncic':'The Maestro','caitlin clark':'The Logo','aj dybantsa':'The Next','harper murray':'The Pin','cooper flagg':'The Phenom','giannis antetokounmpo':'The Greek Freak','aaron judge':'The Judge','lionel messi':'The Genius','stephen curry':'The Revolution','cristiano ronaldo':'The Machine','lebron james':'The King','jordan larson':'The GOAT','madisen skinner':'The Closer','cameron boozer':'The Heir','juju watkins':'The Showstopper'};
const STARLEVEL={'lebron james':9.1,'stephen curry':9.0,'lionel messi':9.3,'cristiano ronaldo':9.0,'giannis antetokounmpo':9.0,'luka doncic':8.8,'aaron judge':9.0,'caitlin clark':8.4,'jordan larson':8.6,'aj dybantsa':7.6,'cooper flagg':7.6,'cameron boozer':7.4,'juju watkins':8.2,'harper murray':7.0,'madisen skinner':7.5,'eugene wilson iii':6.8,'imhotep cromer':6.6};

function slug(s){return (s||'').toLowerCase().replace(/[^a-z ]/g,'').trim();}
function seed(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ()=>{h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}

function buildPlayer(name){
  const k=slug(name);const sport=SPORTOF[k]||'basketball';
  const labels=SPORT_FACETS[sport];
  let P;
  if(AUTHORED[k]){P=Object.assign({name,labels,sport},AUTHORED[k]);}
  else{
    const base=STARLEVEL[k]||7.0;const r=seed(k);
    const facets=labels.map((_,i)=>{let v=base+(r()-.45)*1.1+(i===0?.25:0);return Math.max(4.5,Math.min(9.6,Math.round(v*10)/10));});
    const composite=Math.round((facets.reduce((a,b)=>a+b,0)/8)*10)/10;
    const goat=sport==='basketball'?['Michael Jordan',9.3]:sport==='baseball'?['the baseball GOAT',9.5]:sport==='soccer'?['the soccer GOAT',9.4]:sport==='volleyball'?['the WVB GOAT',9.2]:['the GOAT',9.3];
    const tier=composite>=8.8?'ELITE+':composite>=8.0?'ELITE':composite>=6.8?'STAR':'PROSPECT';
    const stages=[['Early',base-1.6],['Rising',base-.8],['Now',composite],['Next',Math.min(9.6,composite+.5)]];
    P={name,labels,sport,pos:'',voice:VOICEOF[k]||'The Read',tier,composite,goatName:goat[0],goatScore:goat[1],facets,
       asym:{market:'Known for the highlight number everyone can count.',fc:'The competitive trait underneath — the part no box score shows — is the real separator.',gap:'The stat line is the surface. We read the will beneath it.'},
       traj:stages,infl:'the moment the competition rose → the motor answered'};
  }
  // market vector: gap concentrated on invisible facets
  P.market=P.facets.map((v,i)=>Math.max(3,v-(INVIS.indexOf(i)>=0?1.2+( (i*7)%5)/10 :0.2)));
  // submech for lead facet (competitiveness)
  const sm=SUBMECH_BY_SPORT[P.sport];const lead=P.facets[0];
  P.submech=sm.map(([n,d])=>[n, Math.max(4,Math.min(9.7, Math.round((lead + d*10)*10)/10 ))]);
  // reads per facet
  P.reads=P.labels.map((lb,i)=>{
    const v=P.facets[i];const hi=v>=8?'elite':v>=7?'real, translates up':'a genuine tool';
    if(i===0)return 'Competes biggest when the moment is tightest — the trait reads '+(v>=8?'at the pro band.':'ahead of the field.');
    return lb+': '+hi+' — graded off the film, not the box score.';});
  // clip
  P.clip=CLIP_BY_SPORT[P.sport];
  // key attributes = top 3 facets
  P.key=P.labels.map((lb,i)=>[lb,P.facets[i]]).sort((a,b)=>b[1]-a[1]).slice(0,3);
  // moves (what moves competitiveness)
  P.moves=[['A second elite weapon','Add one more thing the defense must respect and competitiveness turns from "imposes effort" to "imposes outcome" — ~+0.3.'],['Vocal leadership','The on-ball will is there; organizing others vocally is the next rung.']];
  // polygon-trajectory vectors per stage (scale facets to each stage composite)
  const now=P.composite;P.morph=P.traj.map(([st,c])=>[st,c,P.facets.map(v=>Math.max(2.5,Math.min(10,v*(c/now))))]);
  return P;
}

const params=new URLSearchParams(location.search);
const P=buildPlayer(params.get('p')||'Madisen Skinner');
const COMPOSITE=P.composite, GOAT=P.goatScore, FACETS=P.facets, LABELS=P.labels;
document.getElementById('pName').textContent=P.name;
document.getElementById('pPos').textContent=(P.sport.charAt(0).toUpperCase()+P.sport.slice(1))+(P.pos?' · '+P.pos:'')+' · '+P.voice;
document.getElementById('pTier').textContent=P.tier;

function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function pt(i,r){const a=(-90+i*45)*Math.PI/180;return [CX+Math.cos(a)*r,CY+Math.sin(a)*r];}
function poly(vals){return vals.map((v,i)=>pt(i,(v/10)*R).join(",")).join(" ");}

/* S0 */
(function(){const g=document.getElementById('s0');
 for(let k=1;k<=4;k++)g.appendChild(el('polygon',{points:poly(FACETS.map(()=>10*k/4)),fill:'none',stroke:'rgba(184,152,90,.07)'}));
 LABELS.forEach((lb,i)=>{const[x,y]=pt(i,R);g.appendChild(el('line',{x1:CX,y1:CY,x2:x,y2:y,stroke:'rgba(184,152,90,.12)'}));
   const[lx,ly]=pt(i,R+28);const anc=lx<CX-12?'end':lx>CX+12?'start':'middle';const inv=INVIS.indexOf(i)>=0;
   const t=el('text',{x:lx,y:ly,fill:inv?'#e6bd6f':'#9a9385','font-size':13.5,'text-anchor':anc,'dominant-baseline':'middle',class:'lbl'});t.textContent=lb;g.appendChild(t);});
 g.appendChild(el('circle',{cx:CX,cy:CY,r:148,fill:'url(#gGlow)'}));
 g.appendChild(el('polygon',{id:'s0poly',points:poly(FACETS),fill:'rgba(184,152,90,.14)',stroke:'url(#gGold)','stroke-width':2.5,'stroke-linejoin':'round'}));
 FACETS.forEach((v,i)=>{const[x,y]=pt(i,(v/10)*R);g.appendChild(el('circle',{cx:x,cy:y,r:4,fill:'#e6bd6f',class:'vtx'}));});
 const num=el('text',{id:'compNum',x:CX,y:CY+8,fill:'#e6bd6f','font-size':50,'text-anchor':'middle','font-family':"'Fraunces',serif",class:'flashable'});num.textContent='0.0';g.appendChild(num);
 const s=el('text',{x:CX,y:CY+29,fill:'#9a9385','font-size':11,'text-anchor':'middle','letter-spacing':2});s.textContent='COMPOSITE';g.appendChild(s);})();

/* sKey — key attributes (top 3) as big chips */
(function(){const g=document.getElementById('sKey');

/* S2 dissection — FIXED: hub label as caption above, nodes in clean lower arc */
(function(){const g=document.getElementById('s2');const ox=460,oy=330;
 const t=el('text',{x:460,y:96,fill:'#e6bd6f','font-size':17,'text-anchor':'middle'});t.textContent=LABELS[0].toUpperCase()+' · '+FACETS[0].toFixed(1);g.appendChild(t);

   const c=2*Math.PI*27,off=c*(1-m[1]/10);node.appendChild(el('circle',{cx:x,cy:y,r:27,fill:'none',stroke:'url(#gGold)','stroke-width':3.5,'stroke-linecap':'round',transform:`rotate(-90 ${x} ${y})`,'stroke-dasharray':c,'stroke-dashoffset':c,class:'ring',style:`--off:${off}`}));
   const v=el('text',{x:x,y:y+5,fill:'#e6bd6f','font-size':15,'text-anchor':'middle',class:'nval flashable',style:`--d:${i}`});v.textContent=m[1].toFixed(1);node.appendChild(v);
   const l=el('text',{x:x,y:y+44,fill:'#c8c1b2','font-size':10.5,'text-anchor':'middle'});l.textContent=m[0];node.appendChild(l);g.appendChild(node);});
 g.appendChild(el('circle',{cx:ox,cy:oy,r:7,fill:'#e6bd6f'}));})();

 g.appendChild(el('circle',{cx:fx+fw/2,cy:fy+fh/2,r:28,fill:'rgba(184,152,90,.12)',stroke:'rgba(184,152,90,.4)'}));g.appendChild(el('path',{d:`M${fx+fw/2-7} ${fy+fh/2-12}l19 12l-19 12z`,fill:'#e6bd6f'}));

/* S4 ceiling */
(function(){const g=document.getElementById('s4');const x0=290,x1=720,y=300,sc=(x1-x0)/10;
 g.appendChild(el('line',{x1:x0,y1:y,x2:x1,y2:y,stroke:'rgba(184,152,90,.18)'}));
 for(let v=0;v<=10;v+=2){const x=x0+v*sc;g.appendChild(el('line',{x1:x,y1:y-4,x2:x,y2:y+4,stroke:'rgba(184,152,90,.3)'}));const t=el('text',{x:x,y:y+22,fill:'#7a7468','font-size':11,'text-anchor':'middle'});t.textContent=v;g.appendChild(t);}
 const gx=x0+GOAT*sc;g.appendChild(el('line',{x1:gx,y1:y-64,x2:gx,y2:y,stroke:'#9aa3ae','stroke-width':2,'stroke-dasharray':'4 4'}));
 const gt=el('text',{x:gx,y:y-72,fill:'#9aa3ae','font-size':13,'text-anchor':'middle'});gt.textContent='GOAT · '+GOAT.toFixed(1);g.appendChild(gt);
 const bar=el('rect',{id:'goatBar',x:x0,y:y-16,width:0,height:32,rx:4,fill:'url(#gGold)'});bar.dataset.w=(FACETS[0]*sc);g.appendChild(bar);
 const pv=el('text',{id:'goatVal',x:x0+10,y:y+6,fill:'#0a0907','font-size':15,'font-weight':600});g.appendChild(pv);
 const px=x0+FACETS[0]*sc;g.appendChild(el('line',{x1:px,y1:y-32,x2:gx,y2:y-32,stroke:'#e6bd6f','stroke-width':2}));
 const gap=el('text',{x:(px+gx)/2,y:y-40,fill:'#e6bd6f','font-size':13,'text-anchor':'middle',class:'flashable',id:'gapTxt'});gap.textContent='gap '+(GOAT-FACETS[0]).toFixed(1);g.appendChild(gap);})();

(function(){const g=document.getElementById('sMorph');
 for(let k=1;k<=4;k++)g.appendChild(el('polygon',{points:poly(FACETS.map(()=>10*k/4)),fill:'none',stroke:'rgba(184,152,90,.06)'}));
 LABELS.forEach((lb,i)=>{const[lx,ly]=pt(i,R+24);const anc=lx<CX-12?'end':lx>CX+12?'start':'middle';const e=el('text',{x:lx,y:ly,fill:'#7a7468','font-size':11,'text-anchor':anc,'dominant-baseline':'middle'});e.textContent=lb;g.appendChild(e);});
 g.appendChild(el('polygon',{id:'morphPoly',points:poly(P.morph[0][2]),fill:'rgba(184,152,90,.14)',stroke:'url(#gGold)','stroke-width':2.5,'stroke-linejoin':'round'}));
 const st=el('text',{id:'morphStage',x:CX,y:CY-2,fill:'#e6bd6f','font-size':22,'text-anchor':'middle','font-family':"'Fraunces',serif"});st.textContent=P.morph[0][0];g.appendChild(st);
 const sv=el('text',{id:'morphVal',x:CX,y:CY+22,fill:'#9a9385','font-size':12,'text-anchor':'middle'});sv.textContent=P.morph[0][1].toFixed(1);g.appendChild(sv);
 const inf=el('text',{x:CX,y:560,fill:'#c8c1b2','font-size':12,'text-anchor':'middle'});inf.textContent=P.infl;g.appendChild(inf);})();

(function(){const g=document.getElementById('s6');
 const tiers=[['evidence · graded clips + sources',470],['EvalGrid sub-mechanics',382],['competitiveness · '+FACETS[0].toFixed(1),294],['8 facets · invisible weighted',206],['composite · '+COMPOSITE.toFixed(1),118]];
 tiers.forEach((t,i)=>{const y=t[1];g.appendChild(el('rect',{x:210,y:y-24,width:500,height:48,rx:9,fill:'#13100b',stroke:'rgba(184,152,90,.2)',class:'tier',style:`--d:${i}`}));
   const tx=el('text',{x:240,y:y+6,fill:i>=3?'#e6bd6f':'#c8c1b2','font-size':i>=4?17:14,'font-family':i>=4?"'Fraunces',serif":'inherit'});tx.textContent=t[0];g.appendChild(tx);});
 for(let i=0;i<6;i++){const d=el('circle',{r:4,fill:'#e6bd6f',class:'fdot',style:`--d:${i}`});d.setAttribute('offset-path',"path('M460 470 L460 118')");g.appendChild(d);}})();

/* mini polygon + share card text */
(function(){const s=document.getElementById('scPoly');const c=40,rr=30;
 function p(vals){return vals.map((v,i)=>{const a=(-90+i*45)*Math.PI/180;return [c+Math.cos(a)*(v/10)*rr,c+Math.sin(a)*(v/10)*rr].join(",");}).join(" ");}
 s.appendChild(el('polygon',{points:p(FACETS.map(()=>10)),fill:'none',stroke:'rgba(184,152,90,.18)','stroke-width':.8}));
 s.appendChild(el('polygon',{points:p(FACETS),fill:'rgba(184,152,90,.2)',stroke:'#e6bd6f','stroke-width':1.5,'stroke-linejoin':'round'}));
 document.getElementById('scName').textContent=P.name;document.getElementById('scMeta').textContent=P.sport+' · '+P.voice;
 document.getElementById('scBig').textContent=COMPOSITE.toFixed(1);document.getElementById('scTier').textContent=P.tier;
 document.getElementById('scAsym').innerHTML='The market says one thing. <b>FieldCheck reads '+P.voice.replace(/^The /,'the ')+'</b> — and tells you why.';})();

const css=document.createElement('style');css.textContent=`
#s0.on .lbl{animation:rise .7s ease both .6s}#s0.on .vtx{animation:pop .55s ease both;animation-delay:calc(.05s*var(--d))}
#s0.on #s0poly{animation:draw 1.3s ease both, breathe 6s ease-in-out 1.4s infinite}#s0.on #compNum{animation:flash 1s ease 1.25s both}
#sKey.on .keychip{animation:pop .6s ease both;animation-delay:calc(.2s*var(--d)+.2s)}#sKey.on .kval{animation:flash .9s ease both;animation-delay:calc(.2s*var(--d)+.9s)}
#s1.on .gapL{animation:pop .6s ease both,pulseLine 2.2s ease 1s infinite;animation-delay:calc(.15s*var(--d)+.3s),calc(.15s*var(--d)+1s)}
#s2.on .node{animation:pop .6s ease both;animation-delay:calc(.22s*var(--d)+.3s)}#s2.on .ring{animation:ringfill 1.15s ease forwards;animation-delay:calc(.22s*var(--d)+.7s)}#s2.on .nval{animation:flash .8s ease both;animation-delay:calc(.22s*var(--d)+1.7s)}
#s3.on .scan{animation:sweep 2.4s ease-in-out .4s both}#s4.on #gapTxt{animation:flash 1s ease 1.3s both}
#s6.on .tier{animation:rise .6s ease both;animation-delay:calc(.16s*var(--d))}#s6.on .fdot{animation:flow 2s linear infinite;animation-delay:calc(.22s*var(--d)+.9s)}`;
document.head.appendChild(css);

/* morph tween across stages */
function runMorph(){const poly=document.getElementById('morphPoly'),stg=document.getElementById('morphStage'),val=document.getElementById('morphVal');if(!poly)return;
 let s=0;function toStage(a,b,k){const va=P.morph[a][2],vb=P.morph[b][2];const cur=va.map((x,i)=>x+(vb[i]-x)*k);poly.setAttribute('points',poly_pts(cur));}
 function poly_pts(vals){return vals.map((v,i)=>{const ang=(-90+i*45)*Math.PI/180;return [CX+Math.cos(ang)*(v/10)*R,CY+Math.sin(ang)*(v/10)*R].join(",");}).join(" ");}
 function step(){if(s>=P.morph.length-1)return;const t0=performance.now();stg.textContent=P.morph[s+1][0];val.textContent=P.morph[s+1][1].toFixed(1);
   (function f(t){const k=Math.min(1,(t-t0)/(RM?1:900));toStage(s,s+1,k);if(k<1)requestAnimationFrame(f);else{s++;setTimeout(step,RM?1:650);}})(performance.now());}
 stg.textContent=P.morph[0][0];val.textContent=P.morph[0][1].toFixed(1);poly.setAttribute('points',poly_pts(P.morph[0][2]));s=0;setTimeout(step,RM?1:500);}

/* beats */
const B=[
 {t:'title',k:'FieldCheck · The Read',h:['The box score tells you what they <em>did</em>.','We tell you who they <em>are</em>.'],d:4000},
 {t:'scene',id:'s0',b:'01 · The read',c:'Eight facets, one honest number — counted from zero, in the open.',d:5600},
 {t:'scene',id:'sKey',b:'02 · Key attributes',c:'The standout traits first — the strengths that define the profile.',d:5200},
 {t:'title',k:'The Moat',h:['Four of these eight facets','are <em>invisible</em> to everyone else.'],d:4000},
 {t:'scene',id:'s1',b:'03 · The asymmetry',c:'The market measures what it can count. We measure what it can\u2019t — every gap lands on an invisible facet.',d:6000},
 {t:'title',k:'The Asymmetry',h:['The market prices the <em>résumé</em>.','FieldCheck prices the <em>will</em>.'],d:3800},
 {t:'scene',id:'s2',b:'04 · The dissection',c:'Competitiveness, opened up — the EvalGrid factors, each scored off the film.',d:6600},
 {t:'title',k:'Why no one else can do this',h:['We grade what the film <em>shows</em>','and the numbers <em>hide</em>.'],d:4200},
 {t:'scene',id:'s3',b:'05 · The evidence',c:'One moment, at the tightest score — and the engine has the receipts.',d:5400},
 {t:'scene',id:'s4',b:'06 · The ceiling',c:'Measured against the apex of the trait. The gap is named, not guessed.',d:5600},
 {t:'scene',id:'sMorph',b:'07 · The trajectory',c:'Watch the whole shape grow — how the profile got here, and where it points.',d:7000},
 {t:'title',k:'The Projection',h:['We don\u2019t just see where they <em>are</em>.','We see where they\u2019re <em>going</em>.'],d:4000},
 {t:'scene',id:'s6',b:'08 · The math',c:'No black box. Evidence to sub-mechanics to facet to number — assembled in the open.',d:6400},
 {t:'share',d:6500}
];
const scenes=document.querySelectorAll('.scene');
const title=document.getElementById('title'),tkick=document.getElementById('tkick'),thead=document.getElementById('thead'),sharecard=document.getElementById('sharecard');
const cap=document.getElementById('cap'),capt=document.getElementById('captext'),beat=document.getElementById('beat'),beatsWrap=document.getElementById('beats');
let idx=0,timer=null,playing=true;
B.forEach((b,i)=>{const d=document.createElement('div');d.className='beatdot'+(b.t==='title'||b.t==='share'?' title':'');d.tabIndex=0;d.addEventListener('click',()=>jump(i));beatsWrap.appendChild(d);});
const dots=[...beatsWrap.children];
function compCount(){const n=document.getElementById('compNum');if(!n)return;const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1200);n.textContent=(COMPOSITE*(.15+.85*k)).toFixed(1);if(k<1)requestAnimationFrame(f);else n.textContent=COMPOSITE.toFixed(1);})(performance.now());}
function goatGrow(){const b=document.getElementById('goatBar'),v=document.getElementById('goatVal');if(!b)return;const w=parseFloat(b.dataset.w);b.style.transition='width 1.3s ease';requestAnimationFrame(()=>b.setAttribute('width',w));const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1300);v.textContent=(FACETS[0]*(.1+.9*k)).toFixed(1);if(k<1)requestAnimationFrame(f);})(performance.now());}
function show(i){idx=i;const b=B[i];dots.forEach((d,k)=>d.classList.toggle('active',k===i));
 if(b.t==='title'){scenes.forEach(s=>s.classList.remove('on'));[sharecard].forEach(o=>o.classList.remove('on'));cap.classList.remove('show');beat.textContent='';capt.textContent='';
   tkick.textContent=b.k;thead.innerHTML=b.h.map(l=>`<span class="ln">${l}</span>`).join('');title.classList.remove('on');void title.offsetWidth;title.classList.add('on');}
 else if(b.t==='share'){scenes.forEach(s=>s.classList.remove('on'));title.classList.remove('on');cap.classList.remove('show');beat.textContent='';capt.textContent='';sharecard.classList.remove('on');void sharecard.offsetWidth;sharecard.classList.add('on');}
 else{title.classList.remove('on');sharecard.classList.remove('on');scenes.forEach(s=>{if(s.id===b.id){s.classList.remove('on');void s.offsetWidth;s.classList.add('on');}else s.classList.remove('on');});
   beat.textContent=b.b;cap.classList.remove('show');capt.textContent=b.c;setTimeout(()=>cap.classList.add('show'),150);
   if(b.id==='s0')compCount();if(b.id==='s4')goatGrow();if(b.id==='sMorph')runMorph();}}
function next(){show((idx+1)%B.length);schedule();}
function schedule(){clearTimeout(timer);if(!playing)return;timer=setTimeout(next,RM?1500:(B[idx].d||5000));}
function jump(i){playing=true;document.getElementById('play').textContent='⏸ Pause';show(i);schedule();}
document.getElementById('play').addEventListener('click',function(){playing=!playing;this.textContent=playing?'⏸ Pause':'▶ Play';playing?schedule():clearTimeout(timer);});
document.getElementById('replay').addEventListener('click',()=>{playing=true;document.getElementById('play').textContent='⏸ Pause';show(0);schedule();});
show(0);schedule();
})();
</script>

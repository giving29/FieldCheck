<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Head-to-Head · FieldCheck IQ</title>
<meta name="description" content="Two athletes. Five layers each. The model explains where they diverge and what it means.">
<meta name="copyright" content="© 2026 ThinkDifferent Holdings">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09080A;--bg1:#100F14;--bg2:#181620;--ge:rgba(255,252,245,.10);--ge2:rgba(255,252,245,.06);--t:#F5F1E8;--t2:rgba(245,241,232,.70);--t3:rgba(245,241,232,.45);--t4:rgba(245,241,232,.25);--gold:#F5B800;--golds:rgba(245,184,0,.10);--goldl:rgba(245,184,0,.28);--moss:#6BAA5A;--mossl:rgba(107,170,90,.15);--mossd:rgba(107,170,90,.32);--red:#FF5C3A;--teal:#4EC9C0;}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--t);font-family:'Inter',-apple-system,sans-serif;line-height:1.6;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -8%,rgba(245,184,0,.065),transparent 60%);}
.wrap{max-width:1060px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.nav{position:sticky;top:0;z-index:90;background:rgba(9,8,10,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--ge)}
.nav-i{max-width:1060px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;gap:24px}
.brand{font-family:'Anton',sans-serif;font-size:18px;color:var(--t);text-decoration:none}.brand b{color:var(--gold)}

.hero{padding:44px 0 28px;text-align:center}
.ey{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
h1{font-family:'Anton',sans-serif;font-size:clamp(26px,5vw,52px);line-height:1.04;letter-spacing:-.016em;margin-bottom:10px}
h1 em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold)}

/* INPUT ROW */
.vs-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:end;margin-bottom:16px}
.vs-input-col{}
.vil{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:7px}
.vi{width:100%;padding:13px 16px;background:var(--bg1);border:1px solid var(--ge);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t);outline:none;transition:border-color .15s}
.vi:focus{border-color:var(--goldl)}
.vs-sep{text-align:center;font-family:'Anton',sans-serif;font-size:24px;color:rgba(245,184,0,.4);padding-bottom:2px}
.vs-sport{width:100%;padding:13px 14px;background:var(--bg1);border:1px solid var(--ge);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t);outline:none;margin-bottom:10px}
.vs-go{width:100%;padding:13px;background:var(--gold);color:#09080A;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s}
.vs-go:hover{opacity:.88}

/* Quick matchups */
.matchups{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.mq{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 13px;border-radius:9999px;border:1px solid var(--ge);color:var(--t4);background:transparent;cursor:pointer;transition:all .15s}
.mq:hover{border-color:var(--goldl);color:var(--gold);background:var(--golds)}

.status{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);text-align:center;min-height:20px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.spinner{width:10px;height:10px;border:2px solid rgba(245,184,0,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;margin-bottom:20px}
.vs-player{background:var(--bg1);border:1px solid var(--ge2);border-radius:16px;padding:22px 20px}
.vs-player.a{border-color:rgba(107,170,90,.25)}
.vs-player.b{border-color:rgba(78,201,192,.25)}
.vp-name{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:-.008em;margin-bottom:4px}
.vp-role{font-size:12px;color:var(--t3);margin-bottom:14px}
.vp-score{font-family:'Anton',sans-serif;font-size:56px;line-height:1;margin-bottom:4px}
.vp-score.a{color:var(--moss)}
.vp-score.b{color:var(--teal)}
.vp-tier{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:9999px;display:inline-block;margin-bottom:14px}
.vp-tier.a{background:var(--mossl);color:var(--moss);border:1px solid var(--mossd)}
.vp-tier.b{background:rgba(78,201,192,.1);color:var(--teal);border:1px solid rgba(78,201,192,.3)}

/* Layer bars */
.layer-bars{display:flex;flex-direction:column;gap:7px}
.lb-row{display:flex;align-items:center;gap:8px}
.lb-name{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t4);width:76px;flex-shrink:0;text-align:right}
.lb-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:9999px;overflow:hidden}
.lb-fill{height:100%;border-radius:9999px;transition:width .6s ease}
.lb-fill.a{background:var(--moss)}
.lb-fill.b{background:var(--teal)}
.lb-val{font-family:'JetBrains Mono',monospace;font-size:11px;width:28px}
.lb-val.a{color:var(--moss)}
.lb-val.b{color:var(--teal)}

/* VS column */
.vs-middle{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px}
.vsm-label{font-family:'Anton',sans-serif;font-size:20px;color:rgba(245,184,0,.35)}
.vsm-layer-diffs{display:flex;flex-direction:column;gap:7px;margin-top:56px}
.vsm-diff{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t4);text-align:center;height:6px;display:flex;align-items:center;justify-content:center}
.vsm-diff.edge-a{color:var(--moss)}
.vsm-diff.edge-b{color:var(--teal)}

/* Analysis */
.vs-analysis{background:var(--bg1);border:1px solid var(--ge2);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.va-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.va-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--ge2)}
.va-row:last-child{border-bottom:none}
.va-layer{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t4);width:80px;flex-shrink:0;margin-top:2px}
.va-winner{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;border-radius:9999px;flex-shrink:0}
.va-winner.a{background:var(--mossl);color:var(--moss);border:1px solid var(--mossd)}
.va-winner.b{background:rgba(78,201,192,.1);color:var(--teal);border:1px solid rgba(78,201,192,.3)}
.va-winner.tie{background:var(--ge2);color:var(--t4);border:1px solid var(--ge)}
.va-read{font-size:13px;color:var(--t2);line-height:1.6;flex:1}

.vs-verdict{background:linear-gradient(135deg,var(--golds),rgba(16,15,18,.8));border:1px solid var(--goldl);border-radius:12px;padding:18px 22px}
.vv-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.vv-read{font-size:14px;color:var(--t2);line-height:1.68}

.footer{margin-top:40px;padding:20px 0;border-top:1px solid var(--ge);font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);text-align:center}
@media(max-width:700px){.vs-grid,.vs-inputs{grid-template-columns:1fr}.vs-sep,.vs-middle{display:none}.vs-player.b{border-color:rgba(78,201,192,.25)}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-i">
  <a href="/" class="brand">Field<b>Check</b></a>
  <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:rgba(245,241,232,.35)">Head-to-Head</div>
</div></nav>
<div class="wrap">
<section class="hero">
  <div class="ey">Head-to-Head · Five Layers Each</div>
  <h1>Two athletes.<br>One <em>honest</em> comparison.</h1>
</section>

<div class="vs-inputs">
  <div class="vs-input-col">
    <div class="vil">// Player A</div>
    <input class="vi" id="playerA" placeholder="e.g. Harper Murray" autocomplete="off">
  </div>
  <div class="vs-sep">VS</div>
  <div class="vs-input-col">
    <div class="vil">// Player B</div>
    <input class="vi" id="playerB" placeholder="e.g. Destinee Hooker" autocomplete="off">
  </div>
</div>
<select class="vs-sport" id="vsSport">
  <option value="womens-volleyball">Women's Volleyball</option>
  <option value="mens-basketball">Men's Basketball</option>
  <option value="womens-basketball">Women's Basketball</option>
  <option value="football">Football</option>
  <option value="baseball">Baseball</option>
</select>
<button class="vs-go" onclick="runVS()">Compare →</button>

<div style="margin-top:14px">
  <div style="font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:10px;text-align:center">// Quick matchups</div>
  <div class="matchups">
    <button class="mq" onclick="quickVS('Darryn Peterson','AJ Dybantsa','mens-basketball')">Peterson vs Dybantsa</button>
    <button class="mq" onclick="quickVS('Harper Murray','Destinee Hooker','womens-volleyball')">Murray vs Hooker</button>
    <button class="mq" onclick="quickVS('Caitlin Clark','Paige Bueckers','womens-basketball')">Clark vs Bueckers</button>
    <button class="mq" onclick="quickVS('Patrick Mahomes','Josh Allen','football')">Mahomes vs Allen</button>
    <button class="mq" onclick="quickVS('Paul Skenes','Gerrit Cole','baseball')">Skenes vs Cole</button>
  </div>
</div>

<div class="status" id="vsStatus"></div>
<div id="vsResult"></div>
<div class="footer">© 2026 ThinkDifferent Holdings · FieldCheck IQ · Head-to-Head</div>
</div>

<script>
const W='https://fieldcheck-proxy.sridhar-nallani.workers.dev';
const LAYERS=['physical','mindset','production','defense','pathway'];
const LAYER_LABELS={physical:'Physical',mindset:'Mindset',production:'Production',defense:'Defense',pathway:'Pathway'};

function quickVS(a,b,sport){
  document.getElementById('playerA').value=a;
  document.getElementById('playerB').value=b;
  document.getElementById('vsSport').value=sport;
  runVS();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function tierLabel(v){return v>=9?'ICON':v>=8.5?'ELITE+':v>=8?'ELITE':v>=7?'HIGH':'VERIFY';}

async function fetchVerdict(name,sport){
  const r=await fetch(`${W}/verdict/player`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,sport})
  });
  return r.json();
}

async function runVS(){
  const a=document.getElementById('playerA').value.trim();
  const b=document.getElementById('playerB').value.trim();
  const sport=document.getElementById('vsSport').value;
  const status=document.getElementById('vsStatus');
  const result=document.getElementById('vsResult');
  if(!a||!b){status.innerHTML='Enter both player names.';return;}

  status.innerHTML='<div class="spinner"></div> Reading both records…';
  result.innerHTML='';

  try{
    const [da,db]=await Promise.all([fetchVerdict(a,sport),fetchVerdict(b,sport)]);
    const oga=da.encyclopedia?.eval_grid?.overall_grade||{};
    const ogb=db.encyclopedia?.eval_grid?.overall_grade||{};
    const ca=Number(oga.composite||7).toFixed(1);
    const cb=Number(ogb.composite||7).toFixed(1);
    const dimsA=oga.dimensions||{};
    const dimsB=ogb.dimensions||{};
    status.innerHTML='';

    const layerBars=(dims,player,cls)=>LAYERS.map(l=>{
      const score=Number(dims[l]?.score||dims[l]||7).toFixed(1);
      return `<div class="lb-row">
        <div class="lb-name">${LAYER_LABELS[l]}</div>
        <div class="lb-bar"><div class="lb-fill ${cls}" style="width:${score*10}%"></div></div>
        <div class="lb-val ${cls}">${score}</div>
      </div>`;
    }).join('');

    // Layer-by-layer analysis
    const layerAnalysis=LAYERS.map(l=>{
      const sa=Number(dimsA[l]?.score||dimsA[l]||7);
      const sb=Number(dimsB[l]?.score||dimsB[l]||7);
      const diff=Math.abs(sa-sb);
      const winnerCls=diff<0.3?'tie':sa>sb?'a':'b';
      const winnerName=diff<0.3?'Even':sa>sb?a:b;
      const reads={
        physical:`Physical: ${a} ${sa.toFixed(1)} · ${b} ${sb.toFixed(1)}. ${diff<0.3?'Essentially matched on measurables.':winnerName+' has a clear physical edge ('+diff.toFixed(1)+' point gap).'}`,
        mindset:`Mindset: ${diff<0.3?'Both show comparable competitive profiles and preparation signals.':winnerName+' scores significantly higher on the character and competitive discipline layer — the most predictive dimension.'}`,
        production:`Production: ${diff<0.3?'Output against competition is comparable.':winnerName+' has the stronger context-adjusted production record.'}`,
        defense:`Defense: ${diff<0.3?'Defensive profiles are matched.':winnerName+' gets the edge on the defensive layer — the most undervalued dimension.'}`,
        pathway:`Pathway: ${diff<0.3?'Pro probability and development trajectories are similar.':winnerName+' has the stronger pro pathway signal based on program, coach, and trajectory.'}`,
      };
      return `<div class="va-row">
        <div class="va-layer">${LAYER_LABELS[l]}</div>
        <div class="va-winner ${winnerCls}">${winnerName}</div>
        <div class="va-read">${reads[l]}</div>
      </div>`;
    }).join('');

    // Overall verdict
    const winner=Number(ca)>Number(cb)?a:Number(cb)>Number(ca)?b:null;
    const overallRead=winner
      ? `${winner} leads overall (${winner===a?ca:cb} vs ${winner===a?cb:ca}). The gap is ${Math.abs(Number(ca)-Number(cb)).toFixed(1)} composite points — ${Math.abs(Number(ca)-Number(cb))<0.5?'significant enough to matter, not enough to be decisive':'meaningful and consistent across multiple layers'}. Look at the layer breakdown for where the real difference lives.`
      : `These athletes are essentially matched at ${ca} composite. The polygon shapes diverge — check the layer analysis for where their profiles differ. Two athletes can share a composite and have completely different ceilings.`;

    result.innerHTML=`
      <div class="vs-grid" style="margin-bottom:16px">
        <div class="vs-player a">
          <div class="vp-name">${esc(a)}</div>
          <div class="vp-role">${sport.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
          <div class="vp-score a">${ca}</div>
          <div class="vp-tier a">${tierLabel(Number(ca))}</div>
          <div class="layer-bars">${layerBars(dimsA,a,'a')}</div>
        </div>
        <div class="vs-middle">
          <div class="vsm-label">VS</div>
          <div class="vsm-layer-diffs">
            ${LAYERS.map(l=>{
              const sa=Number(dimsA[l]?.score||dimsA[l]||7);
              const sb=Number(dimsB[l]?.score||dimsB[l]||7);
              const diff=(sa-sb).toFixed(1);
              const cls=Math.abs(sa-sb)<0.3?'':'sa>sb?edge-a:edge-b';
              return `<div class="vsm-diff">${Math.abs(sa-sb)<0.3?'≈':diff>0?'+'+diff:diff}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="vs-player b">
          <div class="vp-name">${esc(b)}</div>
          <div class="vp-role">${sport.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
          <div class="vp-score b">${cb}</div>
          <div class="vp-tier b">${tierLabel(Number(cb))}</div>
          <div class="layer-bars">${layerBars(dimsB,b,'b')}</div>
        </div>
      </div>
      <div class="vs-analysis">
        <div class="va-title">// Layer-by-layer breakdown</div>
        ${layerAnalysis}
      </div>
      <div class="vs-verdict">
        <div class="vv-title">// The read</div>
        <div class="vv-read">${esc(overallRead)}</div>
      </div>`;
  }catch(e){
    status.innerHTML='';
    result.innerHTML=`<div style="color:var(--t3);font-size:13px;padding:16px;text-align:center">Could not compare — try again.</div>`;
  }
}

['playerA','playerB'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')runVS();});
});
</script>
</body>
</html>

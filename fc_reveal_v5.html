<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldCheck Reads</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0907;--ink2:#13100b;--ink3:#1b1610;--line:rgba(184,152,90,.16);--line2:rgba(184,152,90,.32);--gold:#b8985a;--gold-b:#e8bf70;--bone:#f3eee2;--muted:#a39c8c;--dim:#7d7768;--steel:#6b7480;--steel-b:#9aa3ae;--cg:'Fraunces',serif;--mono:'JetBrains Mono',monospace;--body:'Inter',sans-serif}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 100% at 50% 0%,#15120c 0%,var(--ink) 60%);color:var(--bone);font-family:var(--body);-webkit-font-smoothing:antialiased}
.stage{position:relative;border:1px solid var(--line);border-radius:16px;background:var(--ink2);overflow:hidden;max-width:1000px;margin:0 auto}
.stage-top{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);position:relative;z-index:6}
.stage-top .nm{font-family:var(--cg);font-weight:500;font-size:22px;letter-spacing:-.01em}
.stage-top .po{color:var(--muted);font-size:11.5px;font-family:var(--mono);letter-spacing:.4px}
.stage-top .chip{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;border:1px solid var(--line2);color:var(--gold-b);padding:5px 11px;border-radius:999px}
.moatbadge{position:absolute;right:16px;bottom:13px;font-family:var(--mono);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);opacity:.45;z-index:4;pointer-events:none}
svg{display:block;width:100%;height:auto}text{font-family:var(--mono)}
.scene{opacity:0;transition:opacity .55s ease}.scene.on{opacity:1}
/* point line: one-sentence takeaway, top-left of every scene */
.point{position:absolute;left:22px;top:18px;z-index:3;max-width:62%;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-b);opacity:0;transition:opacity .5s ease}
.point.on{opacity:.92}
.cap{position:absolute;left:0;right:0;bottom:0;padding:18px 24px 20px;background:linear-gradient(0deg,rgba(8,7,5,.95),transparent);font-family:var(--cg);font-size:19px;line-height:1.42;min-height:58px;display:flex;align-items:flex-end;z-index:3}
.cap .beat{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold-b);margin-right:13px;opacity:.92;white-space:nowrap}
.cap span.t{opacity:0;transition:opacity .55s ease}.cap.show span.t{opacity:1}
.ov{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;opacity:0;pointer-events:none;transition:opacity .5s ease}.ov.on{opacity:1}
.title{background:radial-gradient(120% 120% at 50% 40%,#16120b,#070605 82%)}
.title .rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:22px;transition:width .9s ease .2s}.title.on .rule{width:220px}
.title .kick{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-b);margin-bottom:18px;opacity:0;transform:translateY(8px);transition:.55s .25s}.title.on .kick{opacity:.95;transform:none}
.title .head{font-family:var(--cg);font-weight:500;font-size:clamp(26px,4.4vw,46px);line-height:1.16;letter-spacing:-.012em;max-width:19ch}
.title .head .ln{display:block;opacity:0;transform:translateY(14px);transition:.65s cubic-bezier(.2,.7,.3,1)}
.title.on .head .ln:nth-child(1){transition-delay:.4s}.title.on .head .ln:nth-child(2){transition-delay:.8s}
.title.on .head .ln{opacity:1;transform:none}.title .head em{font-style:normal;color:var(--gold-b)}.title.on .head em{animation:flash 1s ease 1.1s both}
.ctl{display:flex;align-items:center;gap:10px;padding:13px 16px 4px;max-width:1000px;margin:0 auto;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1.3px;text-transform:uppercase;border:1px solid var(--line2);background:rgba(184,152,90,.08);color:var(--gold-b);padding:10px 15px;border-radius:999px;cursor:pointer}
.btn.ghost{background:none;color:var(--muted);border-color:var(--line)}
.beats{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;align-items:center}
.beatdot{width:8px;height:8px;border-radius:50%;border:1px solid var(--line2);cursor:pointer;transition:.2s}.beatdot.title{transform:rotate(45deg);border-radius:1px}.beatdot.active{background:var(--gold-b);border-color:var(--gold-b);box-shadow:0 0 0 3px rgba(184,152,90,.18)}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.16)}100%{transform:scale(1);opacity:1}}
@keyframes ringfill{to{stroke-dashoffset:var(--off)}}@keyframes rise{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes flow{0%{offset-distance:0%;opacity:0}12%{opacity:1}88%{opacity:1}100%{offset-distance:100%;opacity:0}}
@keyframes sweep{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.016)}}
@keyframes flash{0%{filter:none;transform:scale(1)}28%{filter:drop-shadow(0 0 16px rgba(232,191,112,.95));transform:scale(1.2)}100%{filter:none;transform:scale(1)}}
@keyframes pulseLine{0%,100%{opacity:.45;stroke-width:3}50%{opacity:1;stroke-width:5}}
.flashable{transform-box:fill-box;transform-origin:center}
.foot{max-width:1000px;margin:14px auto 30px;color:var(--muted);font-size:11px;padding:0 16px}
.foot .sample{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#c9a24a;border:1px solid rgba(201,162,74,.4);background:rgba(201,162,74,.07);padding:3px 8px;border-radius:6px}
:focus-visible{outline:2px solid var(--gold-b);outline-offset:3px}
@media(prefers-reduced-motion:reduce){.scene,.ov{transition:none}*{animation-duration:.001s!important}}
@media(max-width:640px){.cap{font-size:15px;padding:15px}.stage-top .nm{font-size:17px}.point{max-width:70%}}
</style></head>
<body>
<div class="stage">
  <div class="stage-top"><span class="nm" id="pName">—</span><span class="po" id="pPos"></span><span class="chip" id="pTier"></span></div>
  <svg id="canvas" viewBox="0 0 920 600" role="img" aria-label="FieldCheck dissection">
    <defs>
      <linearGradient id="gGold" x1="0" x2="1"><stop offset="0" stop-color="#8a7038"/><stop offset="1" stop-color="#e8bf70"/></linearGradient>
      <radialGradient id="gGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="rgba(184,152,90,.26)"/><stop offset="100%" stop-color="rgba(184,152,90,0)"/></radialGradient>
      <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    </defs>
    <g class="scene" id="s0"></g><g class="scene" id="sInvis"></g><g class="scene" id="s1"></g>
    <g class="scene" id="s2"></g><g class="scene" id="s3"></g><g class="scene" id="s4"></g>
    <g class="scene" id="sPath"></g><g class="scene" id="sMorph"></g><g class="scene" id="s6"></g>
    <g class="scene" id="sFinal"></g>
  </svg>
  <div class="point" id="point"></div>
  <div class="ov title" id="title"><div class="rule"></div><div class="kick" id="tkick"></div><div class="head" id="thead"></div></div>
  <div class="cap" id="cap"><span class="beat" id="beat"></span><span class="t" id="captext"></span></div>
  <div class="moatbadge">The Moat · reading the invisible</div>
</div>
<div class="ctl"><button class="btn" id="play">⏸ Pause</button><button class="btn ghost" id="replay">↻ Replay</button><div class="beats" id="beats"></div></div>
<div class="foot"><span class="sample">Illustrative sample data — calibrated to FieldCheck's ladder, not live engine output</span> · player-aware via <span style="font-family:var(--mono)">?p=name</span></div>

<script>
(function(){
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
const NS="http://www.w3.org/2000/svg";
const CX=370,CY=300,R=174;

/* slots 0,4,5,7 are ALWAYS the four invisible facets, every sport */
const SPORT_FACETS={
 volleyball:['Competitiveness','Power','Physical','Volleyball IQ','Mental Strength','Mindset','Ball Control','Character'],
 basketball:['Competitiveness','Scoring','Athleticism','Basketball IQ','Mental Strength','Mindset','Skill','Character'],
 baseball:['Competitiveness','Power','Speed','Baseball IQ','Mental Strength','Mindset','Hitting','Character'],
 football:['Competitiveness','Explosiveness','Speed','Football IQ','Mental Strength','Mindset','Hands','Character'],
 soccer:['Competitiveness','Finishing','Pace','Vision','Mental Strength','Mindset','Technique','Character']
};
const INVIS=[0,4,5,7];
const SUBMECH_BY_SPORT={
 volleyball:['Response to opponent runs','Late-set kill conversion','Serve-receive under pressure','Demands the ball, tight sets','Bounce-back after a block'],
 basketball:['Response to runs','Closing-time usage','Defensive pickup pressure','50/50 & loose balls','Bounce-back after a miss'],
 baseball:['Two-strike approach','Clutch RBI rate','At-bat after an error','Late-inning focus','Plate discipline under heat'],
 football:['Competes for the ball','Yards after contact','4th-quarter snaps','Response to a deficit','Bounce-back after a drop'],
 soccer:['Big-game goals','Composure 1v1','Press to win it back','Response to going down','Bounce-back after a miss']
};

/* authored players — honest FC-ladder numbers + path-specific clips & reads */
const AUTHORED={
 'madisen skinner':{sport:'volleyball',pos:'Outside Hitter',voice:'The Closer',
   facets:[7.6,7.3,7.0,7.1,7.4,7.0,7.2,7.2],goatName:'the WVB GOAT',goatScore:9.2,
   invisReads:['Her swing gets bigger as the score tightens — the closer\u2019s trait, reading at the pro band.','Doesn\u2019t unravel after a stuff or a run — resets fast, swings clean.','Wants the moment; the late-set conditioning and the demand for the ball show it.','Teammate-first — the culture piece a pro program builds around.'],
   clip:{tag:'NCAA TITLE POINT · LOVB FINALS MVP',cap:'The kill that ended the championship — she asked for the ball at match point.',path:'2× national champion → LOVB Finals MVP'},
   asym:{market:'A decorated college hitter and solid pro prospect.',fc:'An elite competitive closer — the clutch swing already reads pro.'},
   verdict:'The Closer. Already pro where it counts — the résumé is what time adds.',
   traj:[['Club',5.6],['Transfer',6.3],['Title runs',7.0],['Now',7.3],['Pro / LOVB',7.7]],infl:'transfer + title run \u2192 competitiveness re-rated'},
 'jordan larson':{sport:'volleyball',pos:'Outside Hitter',voice:'The GOAT',
   facets:[8.2,7.5,6.8,8.5,8.4,8.0,7.8,8.3],goatName:'the WVB GOAT',goatScore:9.2,
   invisReads:['Two decades of deciding the biggest points — the competitive standard of the sport.','Olympic-final composure; the bigger the moment, the calmer the read.','A lifelong professional\u2019s mindset — still the hardest worker in the gym.','The locker-room cornerstone every team she joins is built around.'],
   clip:{tag:'TOKYO 2020 · GOLD-MEDAL MATCH',cap:'The dig that kept the rally alive — then the swing to end it. Olympic gold.',path:'4× Olympian → Olympic gold → living legend'},
   asym:{market:'A legendary résumé, late in a storied career.',fc:'The IQ and will never aged — still a pro-deciding competitor.'},
   verdict:'The standard. Two decades of deciding the biggest points; the will never aged.',
   traj:[['College',6.4],['Pro',7.6],['Olympic gold',8.4],['Now',8.2],['Legacy',8.5]],infl:'Olympic gold \u2192 the competitive ceiling confirmed'},
 'harper murray':{sport:'volleyball',pos:'Outside Hitter',voice:'The Pin',
   facets:[6.9,6.8,6.9,6.4,6.6,6.7,6.8,6.6],goatName:'the WVB GOAT',goatScore:9.2,
   invisReads:['Plays bigger as the gym gets louder — a young competitor on the rise.','Learning to steady the swing under a run — the next rung is composure.','Wants the spotlight and the work that earns it.','A program favorite — coachable and team-first.'],
   clip:{tag:'NEBRASKA · FIVE-SET COMEBACK',cap:'Down two sets, she took over the pin — the freshman who refused to lose.',path:'Top recruit → Nebraska starter → rising'},
   asym:{market:'A hyped young college star.',fc:'The compete is real; the polish is the climb still ahead.'},
   verdict:'The Pin. Elite young compete; the consistency is the next rung.',
   traj:[['HS',5.4],['Freshman',6.2],['Now',6.9],['Junior',7.2],['Projected',7.6]],infl:'first big college run \u2192 compete confirmed'},
 'cooper flagg':{sport:'basketball',pos:'Forward',voice:'The Phenom',
   facets:[7.7,7.2,7.4,7.1,7.5,7.0,7.3,7.2],goatName:'Michael Jordan',goatScore:9.3,
   invisReads:['Competes every possession the way most prospects compete in the last two minutes.','Doesn\u2019t let a miss bleed into the next two possessions — elite reset.','Wants the hardest matchup; the motor is the identity, not a highlight.','A connector who makes a locker room better — rare for a top prospect.'],
   clip:{tag:'NCAA TOURNAMENT · VS THE #1 SEED',cap:'Three straight stops, then the and-one — effort rose when the game tightened.',path:'#1 HS prospect → freshman phenom → top pick'},
   asym:{market:'Polished two-way wing, safe high-floor #1.',fc:'The competitiveness is the separator — it re-rates the whole profile.'},
   verdict:'The motor is the franchise. Everything else compounds off the compete.',
   traj:[['HS soph',5.4],['HS sr',6.4],['Freshman',7.2],['Now',7.7],['Projected',8.1]],infl:'tournament run vs elite competition \u2192 motor +0.9'},
 'caitlin clark':{sport:'basketball',pos:'Guard',voice:'The Logo',
   facets:[8.0,8.2,7.0,7.9,7.8,7.7,7.6,7.5],goatName:'Michael Jordan',goatScore:9.3,
   invisReads:['Takes — and makes — the biggest shot; the will is why the range is lethal.','Thrives in the loudest buildings; pressure sharpens the decisions.','A relentless worker who reshaped what a guard attempts.','A culture-shifter — lifts a whole sport\u2019s attention with her.'],
   clip:{tag:'THE LOGO THREE · ALL-TIME RECORD',cap:'From four feet behind the line, to break the all-time scoring record.',path:'HS star → record-breaker → pro phenom'},
   asym:{market:'A generational scorer with deep range.',fc:'The competitiveness behind the range is the real engine.'},
   verdict:'The range is the headline; the will to take the moment is the reason.',
   traj:[['HS',6.2],['College',7.4],['Now',8.0],['Pro',8.3],['Projected',8.6]],infl:'record tournament runs \u2192 competitiveness +1.0'},
 'aj dybantsa':{sport:'basketball',pos:'Wing',voice:'The Next',
   facets:[7.4,7.6,7.5,6.9,7.1,6.8,7.4,6.9],goatName:'Michael Jordan',goatScore:9.3,
   invisReads:['The #1 prospect plays like he has something to prove every night.','Steady under the recruiting spotlight — rare for his age.','Wants the smoke; the compete shows in the closeout possessions.','Coachable and well-liked — the makeup checks out.'],
   clip:{tag:'NATIONAL HS FINAL · CLOSEOUT DUNK',cap:'The two-way sequence that ended the title game — the closeout was personal.',path:'#1 HS prospect → BYU → projected lottery'},
   asym:{market:'The consensus #1 high-school prospect.',fc:'A pro scorer\u2019s tools with a real competitive edge underneath.'},
   verdict:'The Next. Pro tools, and a compete that shows up in the biggest games.',
   traj:[['HS soph',5.6],['HS jr',6.6],['Now',7.4],['College',7.8],['Projected',8.2]],infl:'national-final run \u2192 compete confirmed'},
 'aaron judge':{sport:'baseball',pos:'Outfielder',voice:'The Judge',
   facets:[8.4,9.0,7.0,8.2,8.3,8.0,8.1,8.4],goatName:'the baseball GOAT',goatScore:9.5,
   invisReads:['The competitive at-bat under the brightest lights turned power into history.','Unshaken in October pressure — the swing decision never speeds up.','A captain\u2019s mindset; leads the clubhouse standard daily.','The face-of-the-franchise character a city builds around.'],
   clip:{tag:'THE 62ND HOME RUN · AL RECORD',cap:'The record-breaking swing — under a season of relentless pressure.',path:'late-round prospect → MVP → AL HR record'},
   asym:{market:'Record-setting power and three MVPs.',fc:'The competitive at-bat is what made the power historic.'},
   verdict:'Historic power — but the competitive at-bat is what made it history.',
   traj:[['Minors',6.0],['Rookie',7.4],['MVP',8.4],['Record',8.7],['Now',8.5]],infl:'the 62-HR season \u2192 the whole profile re-rated'}
};
const SPORTOF={'eugene wilson iii':'football','imhotep cromer':'football','luka doncic':'basketball','caitlin clark':'basketball','aj dybantsa':'basketball','harper murray':'volleyball','cooper flagg':'basketball','giannis antetokounmpo':'basketball','aaron judge':'baseball','lionel messi':'soccer','stephen curry':'basketball','cristiano ronaldo':'soccer','lebron james':'basketball','jordan larson':'volleyball','madisen skinner':'volleyball','cameron boozer':'basketball','juju watkins':'basketball'};
const VOICEOF={'eugene wilson iii':'The Blur','imhotep cromer':'The Deep Threat','luka doncic':'The Maestro','caitlin clark':'The Logo','aj dybantsa':'The Next','harper murray':'The Pin','cooper flagg':'The Phenom','giannis antetokounmpo':'The Greek Freak','aaron judge':'The Judge','lionel messi':'The Genius','stephen curry':'The Revolution','cristiano ronaldo':'The Machine','lebron james':'The King','jordan larson':'The GOAT','madisen skinner':'The Closer','cameron boozer':'The Heir','juju watkins':'The Showstopper'};
/* honest composite anchors (calibrated DOWN) */
const LEVEL={'lebron james':8.5,'stephen curry':8.4,'lionel messi':8.7,'cristiano ronaldo':8.2,'giannis antetokounmpo':8.3,'luka doncic':8.0,'cameron boozer':6.9,'juju watkins':7.5,'eugene wilson iii':6.2,'imhotep cromer':6.0};

function slug(s){return (s||'').toLowerCase().replace(/[^a-z ]/g,'').trim();}
function rng(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ()=>{h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
function avg(a){return Math.round(a.reduce((x,y)=>x+y,0)/a.length*10)/10;}

function buildPlayer(name){
 const k=slug(name),sport=SPORTOF[k]||'basketball',labels=SPORT_FACETS[sport];let P;
 if(AUTHORED[k]){P=Object.assign({name,labels,sport},AUTHORED[k]);P.composite=avg(P.facets);}
 else{
   const base=LEVEL[k]||6.6,r=rng(k);
   const f=labels.map((_,i)=>Math.max(4.5,Math.min(9.2,Math.round((base+(r()-.5)*1.0+(i===0?.2:0))*10)/10)));
   const composite=avg(f);
   const goat=sport==='basketball'?['Michael Jordan',9.3]:sport==='baseball'?['the baseball GOAT',9.5]:sport==='soccer'?['the soccer GOAT',9.4]:sport==='volleyball'?['the WVB GOAT',9.2]:['the GOAT',9.3];
   P={name,labels,sport,pos:'',voice:VOICEOF[k]||'The Read',facets:f,composite,goatName:goat[0],goatScore:goat[1],
     invisReads:['Competes biggest when the moment is tightest — the trait under the stat line.','Holds composure when the game speeds up.','A worker\u2019s mindset; earns the moment rather than waits for it.','A teammate the room is built around.'],
     clip:{tag:name.toUpperCase()+' · SIGNATURE MOMENT',cap:'The play where the game tightened and the compete answered.',path:'the moment that defines the profile'},
     asym:{market:'Known for the number everyone can count.',fc:'The competitive trait underneath is the real separator.'},
     verdict:(VOICEOF[k]||'The Read')+'. The trait under the stat line is the real story.',
     traj:[['Early',Math.max(4.5,base-1.6)],['Rising',Math.max(5,base-.8)],['Now',composite],['Next',Math.min(9.2,composite+.4)]],infl:'the moment the competition rose \u2192 the motor answered'};
 }
 P.tier=P.composite>=8.6?'ELITE+':P.composite>=7.8?'ELITE':P.composite>=6.6?'STAR':P.composite>=5.4?'PROSPECT':'SCOUT';
 P.market=P.facets.map((v,i)=>Math.max(3,Math.round((v-(INVIS.indexOf(i)>=0?1.2+((i*7)%4)/10:0.25))*10)/10));
 const lead=P.facets[0];const sm=SUBMECH_BY_SPORT[P.sport];const r2=rng(k+'sm');
 P.submech=sm.map((n,i)=>[n,Math.max(4,Math.min(9.3,Math.round((lead+(r2()-.45)*0.8)*10)/10))]);
 P.reads=P.labels.map((lb,i)=>{const v=P.facets[i];return (i===0?'':lb+': ')+(v>=8?'elite for the level':v>=7?'real, translates up':v>=6?'a genuine tool':'a developing tool');});
 P.key=INVIS.map(i=>[P.labels[i],P.facets[i],P.invisReads[INVIS.indexOf(i)]]);
 P.moves=[['A second weapon the defense must respect','turns "imposes effort" into "imposes outcome"'],['Vocal, organizing leadership','the on-ball will is there; leading others is the next rung']];
 const now=P.composite;P.morph=P.traj.map(([st,c])=>[st,c,P.facets.map(v=>Math.max(2.5,Math.min(10,Math.round(v*(c/now)*10)/10)))]);
 return P;
}

const params=new URLSearchParams(location.search);
const P=buildPlayer(params.get('p')||'Madisen Skinner');
const FACETS=P.facets,LABELS=P.labels,COMPOSITE=P.composite,GOAT=P.goatScore;
document.getElementById('pName').textContent=P.name;
document.getElementById('pPos').textContent=P.sport[0].toUpperCase()+P.sport.slice(1)+(P.pos?' · '+P.pos:'')+' · '+P.voice;
document.getElementById('pTier').textContent=P.tier;

function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function txt(p,s){const t=el('text',p);t.textContent=s;return t;}
function pt(i,r){const a=(-90+i*45)*Math.PI/180;return [CX+Math.cos(a)*r,CY+Math.sin(a)*r];}
function poly(vals){return vals.map((v,i)=>pt(i,(v/10)*R).join(",")).join(" ");}
function add(g,e){g.appendChild(e);return e;}

/* S0 polygon */
(function(){const g=document.getElementById('s0');
 for(let k=1;k<=4;k++)add(g,el('polygon',{points:poly(FACETS.map(()=>10*k/4)),fill:'none',stroke:'rgba(184,152,90,.06)'}));

function compCount(){const n=document.getElementById('compNum');if(!n)return;const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1150);n.textContent=(COMPOSITE*(.15+.85*k)).toFixed(1);if(k<1)requestAnimationFrame(f);else n.textContent=COMPOSITE.toFixed(1);})(performance.now());}
function goatGrow(){const b=document.getElementById('goatBar'),v=document.getElementById('goatVal');if(!b)return;const w=parseFloat(b.dataset.w);b.style.transition='width 1.2s ease';requestAnimationFrame(()=>b.setAttribute('width',w));const t0=performance.now();(function f(t){const k=Math.min(1,(t-t0)/1200);v.textContent=(FACETS[0]*(.1+.9*k)).toFixed(1);if(k<1)requestAnimationFrame(f);})(performance.now());}
function show(i){idx=i;const b=B[i];dots.forEach((d,k)=>d.classList.toggle('active',k===i));
 pointEl.classList.remove('on');
 if(b.t==='title'){scenes.forEach(s=>s.classList.remove('on'));cap.classList.remove('show');beat.textContent='';capt.textContent='';
   tkick.textContent=b.k;thead.innerHTML=b.h.map(l=>`<span class="ln">${l}</span>`).join('');title.classList.remove('on');void title.offsetWidth;title.classList.add('on');}
 else{title.classList.remove('on');scenes.forEach(s=>{if(s.id===b.id){s.classList.remove('on');void s.offsetWidth;s.classList.add('on');}else s.classList.remove('on');});
   beat.textContent=b.b;cap.classList.remove('show');capt.textContent=b.c;setTimeout(()=>cap.classList.add('show'),140);
   if(b.pt){pointEl.textContent='› '+b.pt;setTimeout(()=>pointEl.classList.add('on'),200);}
   if(b.id==='s0')compCount();if(b.id==='s4')goatGrow();if(b.id==='sMorph')runMorph();}}
function next(){show((idx+1)%B.length);schedule();}
function schedule(){clearTimeout(timer);if(!playing)return;timer=setTimeout(next,RM?1500:(B[idx].d||5000));}
function jump(i){playing=true;document.getElementById('play').textContent='⏸ Pause';show(i);schedule();}
document.getElementById('play').addEventListener('click',function(){playing=!playing;this.textContent=playing?'⏸ Pause':'▶ Play';playing?schedule():clearTimeout(timer);});
document.getElementById('replay').addEventListener('click',()=>{playing=true;document.getElementById('play').textContent='⏸ Pause';show(0);schedule();});
show(0);schedule();
})();
</script>
</body></html>
